<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Financiero</title>
<style>
:root {
  --bg:#0f1117;--bg2:#171b26;--bg3:#1e2332;--bg4:#252b3b;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--text2:#8b92a8;--text3:#555e78;
  --blue:#4d8ef0;--blue-d:#1a3d80;
  --green:#34c47c;--green-d:#0d4027;
  --amber:#f5a623;--amber-d:#5a3800;
  --red:#f05a5a;--red-d:#5a1a1a;
  --purple:#9b7ef5;--purple-d:#3a2a7a;
  --teal:#2dd4bf;--coral:#f07850;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:16px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-mark{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);font-family:'DM Mono',monospace}
.sidebar-logo .logo-title{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text);margin-top:3px}
.sidebar-logo .logo-sub{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:.03em}
.sync-status{padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.saving{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.month-nav button{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;width:24px;height:24px;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{background:var(--bg4);color:var(--text)}
.month-nav .mlbl{font-size:12px;font-weight:500}
.nav-items{flex:1;padding:8px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:12px;color:var(--text2);border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--blue);border-left-color:var(--blue);background:rgba(77,142,240,.08);font-weight:500}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.page{display:none;padding:12px 16px;max-width:none}
.page.active{display:block}
.page-title{font-size:16px;font-weight:600;margin-bottom:14px}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.metric{background:var(--bg3);border-radius:var(--radius-sm);padding:14px}
.metric .m-lbl{font-size:10px;color:var(--text3);margin-bottom:6px}
.metric .m-val{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
.metric .m-sub{font-size:10px;color:var(--text3);margin-top:3px}
.pbar{height:4px;border-radius:99px;background:var(--bg4);overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:99px;transition:width .5s ease}
.ri{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.ri:last-of-type{border-bottom:none}
.ri-l{flex:1;min-width:0}
.ri-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.ri-meta{font-size:10px;color:var(--text3);margin-top:2px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ri-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.bdg{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
.bdg-ok{background:var(--green-d);color:var(--green)}
.bdg-pend{background:var(--amber-d);color:var(--amber)}
.bdg-parcial{background:#3a2a00;color:#f5c842}
.bdg-eur{background:var(--blue-d);color:var(--blue)}
.bdg-brl{background:var(--green-d);color:var(--green)}
.bdg-acc{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.bdg-fijo{background:var(--purple-d);color:var(--purple)}
.bdg-tc{background:#4a2a10;color:var(--coral)}
.bdg-fian{background:var(--amber-d);color:var(--amber)}
.positive{color:var(--green)}.negative{color:var(--red)}.amber{color:var(--amber)}
.ibtn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 4px;border-radius:4px;line-height:1}
.ibtn:hover{color:var(--text);background:var(--bg4)}
.ibtn-g{background:var(--green-d);color:var(--green);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ibtn-g:hover{opacity:.8}
.ibtn-r{background:var(--red-d);color:var(--red);border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ibtn-r:hover{opacity:.8}
.abtn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;color:var(--text);font-size:12px;width:100%;margin-top:6px;font-family:inherit}
.abtn:hover{background:var(--bg4)}
.savebtn{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--green-d);color:var(--green);border:1px solid var(--green);cursor:pointer;font-family:inherit;white-space:nowrap}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fc label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px}
.fc input,.fc select,input[type=text],input[type=number],select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:12px;padding:5px 8px;width:100%;font-family:inherit;outline:none}
.fc input:focus,.fc select:focus,input:focus,select:focus{border-color:var(--blue)}
.edit-row{display:flex;gap:5px;margin:3px 0;align-items:center;flex-wrap:wrap}
.edit-row input,.edit-row select{width:auto;flex-shrink:0}
.confirm-box{background:var(--red-d);border:1px solid rgba(240,90,90,.3);border-radius:var(--radius-sm);padding:8px 10px;margin:3px 0;font-size:11px;color:var(--red)}
.confirm-box .cb-btns{display:flex;gap:6px;margin-top:6px}
.confirm-box .cb-btns button{font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:inherit;border:none}
.btn-confirm{background:var(--red);color:#fff}
.btn-cancel{background:var(--bg4);color:var(--text)}
.pay-row{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 8px;margin:4px 0;display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.trow{display:flex;justify-content:space-between;font-weight:600;font-size:11px;padding-top:8px;margin-top:4px;border-top:1px solid var(--border2)}
.hint{font-size:10px;color:var(--text3);font-style:italic;padding:5px 0}
.credit-item{padding:8px 0;border-bottom:1px solid var(--border)}
.credit-item:last-of-type{border-bottom:none}
.chart-opts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.copt{font-size:11px;padding:5px 12px;border:1px solid var(--border2);border-radius:99px;cursor:pointer;background:var(--bg3);color:var(--text2);transition:all .15s}
.copt:hover{color:var(--text)}
.copt.sel1{background:rgba(77,142,240,.15);color:var(--blue);border-color:var(--blue);font-weight:500}
.copt.sel2{background:rgba(52,196,124,.15);color:var(--green);border-color:var(--green);font-weight:500}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:32px 28px;width:280px;display:flex;flex-direction:column;gap:14px}

.auth-card .a-sub{font-size:11px;color:var(--text3);margin-top:-8px}
.auth-card input{width:100%;padding:9px 10px;font-size:13px}
.auth-card .a-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.auth-card .a-btn:hover{opacity:.9}
.auth-card .a-err{font-size:11px;color:var(--red);display:none;text-align:center}
.loading-overlay .spin{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){
  .shell{flex-direction:column}
  .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;overflow-x:auto}
  .nav-items{display:flex;flex-direction:row;padding:4px}
  .nav-item{border-left:none;border-bottom:2px solid transparent;padding:6px 10px;white-space:nowrap}
  .nav-item.active{border-left:none;border-bottom-color:var(--blue)}
  .month-nav{min-width:160px}
  .grid4{grid-template-columns:1fr 1fr}
  .fgrid{grid-template-columns:1fr}
  .main{height:calc(100vh - 130px)}
}
</style>

function setSyncStatus(state, txt) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncTxt');
  dot.className = 'sync-dot ' + state;
  label.textContent = txt;
  label.style.color = state==='ok' ? 'var(--green)' : state==='err' ? 'var(--red)' : 'var(--amber)';
}

function cloudKey() { return `main_${currentYear}`; }

async function loadFromCloud() {
  try {
    // Try year-specific key
    let r = await fetch(`${SB_URL}/rest/v1/cf_data?id=eq.${cloudKey()}&select=payload`, {headers: HEADERS});
    if (!r.ok) throw new Error(r.status);
    let rows = await r.json();
    if (rows.length && rows[0].payload && Object.keys(rows[0].payload).length > 0) return rows[0].payload;
    // Fallback: legacy key 'main' (migración primera carga 2026)
    if (currentYear === 2026) {
      r = await fetch(`${SB_URL}/rest/v1/cf_data?id=eq.main&select=payload`, {headers: HEADERS});
      if (!r.ok) throw new Error(r.status);
      rows = await r.json();
      if (rows.length && rows[0].payload && Object.keys(rows[0].payload).length > 0) return rows[0].payload;
    }
    return null;
  } catch(e) { console.error('Load error', e); return null; }
}

let _lastSyncedAt = null;

async function saveToCloud(data) {
  setSyncStatus('saving', 'Guardando...');
  try {
    const key = cloudKey();
    const ts = new Date().toISOString();
    const r = await fetch(`${SB_URL}/rest/v1/cf_data`, {
      method: 'POST',
      headers: {...HEADERS, 'Prefer': 'resolution=merge-duplicates,return=minimal'},
      body: JSON.stringify({id: key, payload: data, updated_at: ts})
    });
    if (!r.ok) throw new Error(r.status);
    _lastSyncedAt = ts;
    setSyncStatus('ok', 'Guardado ✓');
  } catch(e) { setSyncStatus('err', 'Error al guardar'); console.error('Save error', e); }
}

async function pollRemoteChanges() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/cf_data?id=eq.${cloudKey()}&select=updated_at`, {headers: HEADERS});
    if (!r.ok) return;
    const rows = await r.json();
    if (!rows.length) return;
    const remoteAt = rows[0].updated_at;
    if (_lastSyncedAt && remoteAt && remoteAt !== _lastSyncedAt) {
      _lastSyncedAt = remoteAt;
      const saved = await loadFromCloud();
      if (saved) { importState(saved); renderAll(); setSyncStatus('ok', 'Sincronizado ✓'); }
    } else if (!_lastSyncedAt && remoteAt) {
      _lastSyncedAt = remoteAt;
    }
  } catch(e) {}
}
setInterval(pollRemoteChanges, 30000);

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncStatus('saving', 'Guardando...');
  saveTimer = setTimeout(() => saveToCloud(exportState()), 1200);
}

function seedInto(d, m, gEUR, gBRL, ing, cuentas) {

    if (ex) Object.assign(ex, sg);
    else d[m].gastosREAL.push({tipo:'puntual',valor:'variable',tc:false,...sg});

    if (ex) Object.assign(ex, si);
    else d[m].ingresos.push({tipo:'puntual',valor:'variable',...si});
  });
  if (cuentas) d[m].cuentas = deepClone(cuentas);
}

function updateTCRow(d, m) {
  if (!d[m]) return;
  const tcSum = d[m].gastosEUR.filter(g=>g.tc&&!g.isTCRow).reduce((s,g)=>s+g.total,0);
  const tcVar = d[m].tcVariable||0;
  const tcTotal = fmtM(tcSum + tcVar);
  const row = d[m].gastosEUR.find(g=>g.isTCRow);
  if (row) {
    row.total = d[m].tcFinanciado ? 0 : tcTotal;
    row.pagado = d[m].tcFinanciado ? 0 : (d[m].tcPagado ? tcTotal : 0);
  }
}

}
function importState(s) {
  if (!s || !s.DATA) return;
  DATA = s.DATA;
  if (s.CREDITOS) CREDITOS = s.CREDITOS;
  if (s.FIANZAS) FIANZAS = s.FIANZAS;
  if (s.CUSTOM_CUENTAS_EUR) CUSTOM_CUENTAS_EUR = s.CUSTOM_CUENTAS_EUR;
  if (s.CUSTOM_CUENTAS_BRL) CUSTOM_CUENTAS_BRL = s.CUSTOM_CUENTAS_BRL;
  if (s.CUSTOM_TIPOS_FINANC) CUSTOM_TIPOS_FINANC = s.CUSTOM_TIPOS_FINANC;
  if (s.nextCreditId) nextCreditId = s.nextCreditId;
  // migrate old tipo keys
  const _tipoMap={'financiamiento':'Financiamientos BBVA','cofidis':'Cofidis','seguridad_social':'Seguridad Social','taja_basura':'Taja Basura','otros':'Otros'};
  CREDITOS.forEach(c=>{if(_tipoMap[c.tipo])c.tipo=_tipoMap[c.tipo];});
  // migrate fianzas without inicio
  FIANZAS.forEach(f=>{if(!f.inicio)f.inicio='06/2026';});
  // fix data consistency
  const _now=new Date();
  CREDITOS.forEach(c=>{
    // 1) if liquidadoEn is set, restore full state and backfill pagadoEnLiquidacion if missing
    if(c.liquidadoEn){
      c.cuotasPag=c.totalCuotas;c.pagado=c.totalImporte;
      return;
    }
    // 2) cap cuotasPag to totalCuotas, recompute pagado
    if(c.cuotasPag>c.totalCuotas)c.cuotasPag=c.totalCuotas;
    c.pagado=fmtM(Math.min(c.cuotasPag*c.cuota,c.totalImporte));
    // 3) if now fully paid, backfill liquidadoEn from natural end month
    if(c.cuotasPag>=c.totalCuotas){
      const[mm,yy]=(c.inicio||'').split('/').map(Number);
      if(mm&&yy){const mFin=yy*12+(mm-1)+c.totalCuotas-1;c.liquidadoEn=`${String(mFin%12+1).padStart(2,'0')}/${Math.floor(mFin/12)}`;}
      else{c.liquidadoEn=`${String(_now.getMonth()+1).padStart(2,'0')}/${_now.getFullYear()}`;}
      return;
    }
    // 4) backfill ultimoPagoMes/Anio so cuotaMesPagada works for pre-existing payments
    if(c.cuotasPag>0&&c.ultimoPagoMes==null){
      const[mm,yy]=(c.inicio||'').split('/').map(Number);
      if(mm&&yy){const lastIdx=yy*12+(mm-1)+(c.cuotasPag-1);c.ultimoPagoMes=lastIdx%12;c.ultimoPagoAnio=Math.floor(lastIdx/12);}
    }
  });
  // ensure all months exist
  for (let m = 0; m < 12; m++) {
    if (!DATA[m]) DATA[m] = buildDefaultData()[m];
  }
  // backfill fixed items from month 5 to months 6-11 (fill gaps, don't overwrite)
  const _hl = 5;
  if (DATA[_hl]) {
    DATA[_hl].gastosEUR.filter(g=>g.tipo==='fijo').forEach(g=>{
      for(let m=_hl+1;m<=11;m++){
        if(!DATA[m].gastosEUR.find(x=>x.name===g.name)){
          DATA[m].gastosEUR.push({...deepClone(g),pagado:0});
          updateTCRow(DATA,m);
        }
      }
    });
    DATA[_hl].gastosREAL.filter(g=>g.tipo==='fijo').forEach(g=>{
      for(let m=_hl+1;m<=11;m++){
        if(!DATA[m].gastosREAL.find(x=>x.name===g.name))
          DATA[m].gastosREAL.push({...deepClone(g),pagado:0});
      }
    });
    DATA[_hl].ingresos.filter(i=>i.tipo==='fijo').forEach(i=>{
      for(let m=_hl+1;m<=11;m++){
        if(!DATA[m].ingresos.find(x=>x.name===i.name))
          DATA[m].ingresos.push({...deepClone(i),recibido:0});
      }
    });
  }
}

// ─── PROPAGATE ───────────────────────────────────────────────────────────────
// Histórico boundary: months 0-4 = JAN-MAY (isolated). Month 5+ = active range.
const HIST_LIMIT = 5; // June index

function propagateFixed(item, isEUR, fromM) {
  // Historical months never propagate into June+; active months propagate forward within active range
  const toM = fromM < HIST_LIMIT ? HIST_LIMIT - 1 : 11;
  for (let m = fromM+1; m <= toM; m++) {
    const arr = isEUR ? DATA[m].gastosEUR : DATA[m].gastosREAL;
    const ex = arr.find(g=>g.name===item.name);
    if (ex) {
      ex.tipo='fijo'; ex.cuenta=item.cuenta; ex.tc=item.tc;
      if (item.valor==='fijo') ex.total=item.total;
      else ex.total=0;
    } else {
      arr.push({...deepClone(item), pagado:item.tc?item.total:0, total:item.valor==='fijo'?item.total:0});
    }
    if (isEUR) updateTCRow(DATA, m);
  }
}
function propagateFixedI(item, fromM) {
  const toM = fromM < HIST_LIMIT ? HIST_LIMIT - 1 : 11;
  for (let m = fromM+1; m <= toM; m++) {
    const arr = DATA[m].ingresos;
    const ex = arr.find(i=>i.name===item.name);
    if (ex) {
      ex.tipo='fijo'; ex.cuenta=item.cuenta;
      if (item.valor==='fijo') ex.total=item.total;
      else ex.total=0;
    } else {
      arr.push({...deepClone(item), recibido:0, total:item.valor==='fijo'?item.total:0});
    }
  }
}
// Forward cascade delete — never touches months before currentMonth
function cascadeDeleteGasto(name, isEUR, fromM) {
  if (fromM < HIST_LIMIT) { // historical: only current month (already spliced by caller)
    return;
  }
  for (let m = fromM+1; m < 12; m++) {
    const arr = isEUR ? DATA[m].gastosEUR : DATA[m].gastosREAL;
    const idx = arr.findIndex(g=>g.name===name);
    if (idx !== -1) { arr.splice(idx,1); if(isEUR) updateTCRow(DATA,m); }
  }
}
function cascadeDeleteIngreso(name, fromM) {
  if (fromM < HIST_LIMIT) return;
  for (let m = fromM+1; m < 12; m++) {
    const arr = DATA[m].ingresos;
    const idx = arr.findIndex(i=>i.name===name);
    if (idx !== -1) arr.splice(idx,1);
  }
}

function getCuentasForMonth(m) {
  if (DATA[m] && DATA[m].cuentas.some(c=>c.manual)) return DATA[m].cuentas;
  for (let prev=m-1; prev>=0; prev--) {
    if (DATA[prev] && DATA[prev].cuentas.some(c=>c.manual))
      return DATA[prev].cuentas.map(c=>({...c,manual:false}));
  }
  return DATA[m] ? DATA[m].cuentas : [];
}

function creditoAplicaM(c,m,y){const[mm,yy]=(c.inicio||'').split('/').map(Number);if(!mm||!yy)return true;return yy<y||(yy===y&&mm<=m+1);}
function cuotaMesPagada(c){if(c.cuotasPag>=c.totalCuotas)return true;return c.ultimoPagoMes===currentMonth&&c.ultimoPagoAnio===currentYear;}
function creditoVigenteEnMes(c,m,y){if(c.cuotasPag>=c.totalCuotas){if(c.liquidadoEn){const[lm,ly]=c.liquidadoEn.split('/').map(Number);return y*12+m<=ly*12+(lm-1);}const[mm2,yy2]=(c.inicio||'').split('/').map(Number);if(mm2&&yy2){const mesFin=yy2*12+(mm2-1)+c.totalCuotas-1;return y*12+m<=mesFin;}return false;}
const[mm,yy]=(c.inicio||'').split('/').map(Number);if(!mm||!yy)return true;const mesActual=y*12+m;const mesInicio=yy*12+(mm-1);const mesFin=mesInicio+c.totalCuotas-1;return mesActual>=mesInicio&&mesActual<=mesFin;}
function fianzaVigenteEnMes(f,m,y){if(f.pagada)return false;const[mm,yy]=(f.inicio||'').split('/').map(Number);if(!mm||!yy)return true;return y*12+m>=yy*12+(mm-1);}
function activeCuotasForCuenta(cuenta){return CREDITOS.filter(c=>c.cuenta===cuenta&&creditoVigenteEnMes(c,currentMonth,currentYear));}

  const activeCuotas=CREDITOS.filter(c=>creditoVigenteEnMes(c,currentMonth,currentYear));
  const activeFianzas=FIANZAS.filter(f=>fianzaVigenteEnMes(f,currentMonth,currentYear));
  const tFianE=activeFianzas.reduce((s,f)=>s+f.importe,0);
  const tGE=[...vis,tcRow].filter(Boolean).reduce((s,g)=>s+g.total,0)+activeCuotas.reduce((s,c)=>s+c.cuota,0)+tFianE;
  const tPE=[...vis,tcRow].filter(Boolean).reduce((s,g)=>s+g.pagado,0)+activeCuotas.filter(c=>cuotaMesPagada(c)).reduce((s,c)=>s+(c.cuotasPag>=c.totalCuotas?(c.pagadoEnLiquidacion??c.cuota):c.cuota),0);
  const tGB=d.gastosREAL.reduce((s,g)=>s+g.total,0);

  const sB=cuentas.filter(c=>c.moneda==='R$').reduce((s,c)=>s+c.saldo,0);
  const pendE=tGE-tPE, pendB=tGB-tPB;
  const pctE=tGE>0?Math.round((tPE/tGE)*100):100;
  const pctB=tGB>0?Math.round((tPB/tGB)*100):100;

  const pFianE=tGE>0?Math.min(100,Math.round(tFianE/tGE*100)):0;
  document.getElementById('page-dashboard').innerHTML=`

        </div>

          <div class="metric"><div class="m-lbl">Pendiente</div><div class="m-val ${pendB>0?'negative':'positive'}">R$${fmtN(pendB)}</div></div>
          <div class="metric"><div class="m-lbl">Saldo cuentas</div><div class="m-val">R$${fmtN(sB)}</div></div>

          <div class="pbar"><div class="pfill" style="width:${pctB}%;background:var(--green)"></div></div>
        </div>
      </div>
    </div>

        ${c.nota?`<div class="m-sub">${c.nota}</div>`:''}

    `;
}

// ─── GASTOS ───────────────────────────────────────────────────────────────────
let showingTCEdit = false, editingTCIdx = null, showingAddTC = false;

function renderGastos() {
  const d=getD(); const isFuture=currentMonth>new Date().getMonth();
  const cEUR=BASE_CUENTAS_EUR(); const cBRL=BASE_CUENTAS_BRL();

  function row(g, isEUR) {
    const arr=isEUR?d.gastosEUR:d.gastosREAL;
    const i=arr.indexOf(g);
    const sym=isEUR?'€':'R$'; const pend=+(g.total-g.pagado).toFixed(2);
    if(confirmG&&confirmG.isEUR===isEUR&&confirmG.idx===i)
      return`<div class="confirm-box">¿Quitar <b>${g.name}</b>?<div class="cb-btns"><button class="btn-confirm" onclick="deleteGasto(${i},${isEUR})">Quitar</button><button class="btn-cancel" onclick="confirmG=null;renderGastos()">Cancelar</button></div></div>`;

        <div class="edit-row">
          <select id="eg-tipo"><option value="fijo"${g.tipo==='fijo'?' selected':''}>Fijo</option><option value="puntual"${g.tipo!=='fijo'?' selected':''}>Puntual</option></select>
          <select id="eg-valor"><option value="fijo"${g.valor==='fijo'?' selected':''}>Valor fijo</option><option value="variable"${g.valor!=='fijo'?' selected':''}>Variable</option></select>
          ${isEUR?`<label style="font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px"><input type="checkbox" id="eg-tc" ${g.tc?'checked':''}> TC</label>`:''}
          <select id="eg-estado"><option value="pagado"${pend<=0?' selected':''}>Pagado</option><option value="pend"${pend>0&&g.pagado===0?' selected':''}>Pendiente</option><option value="parcial"${g.pagado>0&&pend>0?' selected':''}>Pago parcial</option></select>
          ${g.pagado>0&&pend>0?`<input id="eg-pagado" type="number" value="${g.pagado}" step="0.01" style="width:65px">`:''}
        </div>
        <div class="edit-row"><button class="savebtn" onclick="saveGasto(${i},${isEUR})">Guardar</button><button class="ibtn" onclick="editingG=null;renderGastos()">✕</button></div>
      </div>`;
    }
    if(payRowG&&payRowG.isEUR===isEUR&&payRowG.idx===i)
      return`<div style="padding:5px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:500;margin-bottom:4px">${g.name} — ${sym}${fmtN(g.total)}</div>
        <div class="pay-row"><span style="font-size:10px;color:var(--text3)">Importe pagado:</span><input type="number" id="prg-val" value="${pend>0&&g.pagado>0?g.pagado:g.total}" step="0.01" max="${g.total}" onkeydown="if(event.key==='Enter')savePagoG(${i},${isEUR})" autofocus><button onclick="savePagoG(${i},${isEUR})">✓ Confirmar</button><button class="ibtn" onclick="payRowG=null;renderGastos()">✕</button></div>
      </div>`;
    return`<div class="ri">
      <div class="ri-l"><div class="ri-name">${g.name}</div>
        <div class="ri-meta">
          ${g.tipo==='fijo'?`<span class="bdg bdg-fijo">Fijo</span>`:''}
          ${g.valor==='variable'?`<span class="bdg bdg-acc">Variable</span>`:''}
        </div>
      </div>
      <div class="ri-r">
        <span style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace">${sym}${fmtN(g.total)}</span>
        ${badgeEstado(g.pagado,g.total)}
        <button class="ibtn-g" onclick="payRowG={isEUR:${isEUR},idx:${i}};payRowI=editingG=confirmG=null;renderGastos()" title="Pagar">💳</button>
        <button class="ibtn" onclick="editingG={isEUR:${isEUR},idx:${i}};editingI=confirmG=payRowG=null;renderGastos()" title="Editar">✎</button>
        <button class="ibtn" onclick="confirmG={isEUR:${isEUR},idx:${i}};editingG=null;renderGastos()" title="Quitar" style="color:var(--red)">✕</button>
      </div></div>`;
  }

  function cuotaRow(c){
    const liquidado=c.cuotasPag>=c.totalCuotas;
    const pagada=cuotaMesPagada(c);
    const importe=liquidado?(c.pagadoEnLiquidacion??c.cuota):c.cuota;
    const importeLbl=liquidado?`€${fmtN(importe)}`:`€${fmtN(importe)}/mes`;
    return`<div class="ri">
      <div class="ri-l"><div class="ri-name">${c.name}</div><div class="ri-meta"><span class="bdg bdg-fijo">Financ.</span> · ${c.cuotasPag}/${c.totalCuotas}</div></div>
      <div class="ri-r">
        <span style="font-size:11px;font-family:'DM Mono',monospace">${importeLbl}</span>
        ${pagada?'<span class="bdg bdg-ok">Pagado</span>':'<span class="bdg bdg-pend">Pendiente</span>'}
        ${!liquidado?`<button class="ibtn-g" onclick="pagarCuota(${c.id});renderAll()" title="Pagar cuota"${pagada?' style="opacity:.35;pointer-events:none"':''}>+</button><button class="ibtn-r" onclick="quitarCuota(${c.id});renderAll()" title="Deshacer cuota"${!pagada?' style="opacity:.35;pointer-events:none"':''}>−</button>`:''}
      </div></div>`;
  }
  function groupCard(label, items, isEUR, cuenta) {
    const cuotas = cuenta ? activeCuotasForCuenta(cuenta) : [];
    const fActivas = (isEUR && cuenta) ? FIANZAS.filter(f=>fianzaVigenteEnMes(f,currentMonth,currentYear)&&(cuenta==='Otros'?(f.pagadoPor!=='BBVA'&&f.pagadoPor!=='Sabadell'):f.pagadoPor===cuenta)) : [];
    if(!items.length && !cuotas.length && !fActivas.length) return '';
    const sym=isEUR?'€':'R$';
    const sorted=[...items].sort((a,b)=>b.total-a.total);
    const cuotasTotal=cuotas.reduce((s,c)=>s+(c.cuotasPag>=c.totalCuotas?(c.pagadoEnLiquidacion??c.cuota):c.cuota),0);
    const fianzasTotal=fActivas.reduce((s,f)=>s+f.importe,0);
    const itemsTotal=items.reduce((s,g)=>s+g.total,0);
    const fianzaRows=fActivas.map(f=>`<div class="ri"><div class="ri-l"><div class="ri-name">${f.nombre}</div><div class="ri-meta"><span class="bdg" style="background:var(--amber);color:#000">Fianza</span>${f.notas?' · '+f.notas:''}</div></div><div class="ri-r"><span style="font-size:11px;font-family:'DM Mono',monospace" class="negative">€${fmtN(f.importe)}</span></div></div>`).join('');
    return`<div class="sep">${label}</div><div class="card">${sorted.map(g=>row(g,isEUR)).join('')}${cuotas.map(c=>cuotaRow(c)).join('')}${fianzaRows}<div class="trow"><span>Total</span><span>${sym}${fmtN(itemsTotal+cuotasTotal+fianzasTotal)}</span></div></div>`;
  }

  // EUR: group by account, exclude tc items
  const eurNonTC=d.gastosEUR.filter(g=>!g.tc&&!g.isTCRow);
  const bbva=eurNonTC.filter(g=>g.cuenta==='BBVA');
  const sabadell=eurNonTC.filter(g=>g.cuenta==='Sabadell');
  const otrosEUR=eurNonTC.filter(g=>g.cuenta!=='BBVA'&&g.cuenta!=='Sabadell');

  // TC section
  const tcItems=d.gastosEUR.filter(g=>g.tc&&!g.isTCRow).sort((a,b)=>b.total-a.total);
  const tcFija=fmtM(tcItems.reduce((s,g)=>s+g.total,0));
  const tcVar=d.tcVariable||0;
  const tcTotal=fmtM(tcFija+tcVar);
  const tcFinanciado=d.tcFinanciado||false; const tcPagado=d.tcPagado||false;
  // TC items rows — individual edit/delete
  function tcItemRow(g, gi) {
    if (editingTCIdx === gi) return `
      <div class="edit-row" style="padding:4px 0;border-bottom:1px solid var(--border)">
        <input id="tce-n-${gi}" value="${g.name}" style="width:120px" placeholder="Nombre">
        <input id="tce-v-${gi}" type="number" value="${g.total}" step="0.01" style="width:70px" placeholder="€">
        <span style="font-size:11px;color:var(--text2)">€</span>
        <button class="savebtn" onclick="saveTCItemSingle(${gi})">✓</button>
        <button class="ibtn" onclick="editingTCIdx=null;renderGastos()">✕</button>
      </div>`;
    return `<div class="ri">
      <div class="ri-l"><div class="ri-name">${g.name}</div></div>
      <div class="ri-r">
        <span style="font-size:11px;font-family:'DM Mono',monospace">€${fmtN(g.total)}</span>
        <button class="ibtn" onclick="editingTCIdx=${gi};showingAddTC=false;renderGastos()" title="Editar">✎</button>
        <button class="ibtn" onclick="deleteTCItem(${gi})" style="color:var(--red)" title="Quitar">✕</button>
      </div></div>`;
  }
  const addTCForm = showingAddTC ? `
    <div class="edit-row" style="padding:6px 0;border-top:1px solid var(--border);margin-top:4px">
      <input id="tc-new-n" placeholder="Nombre cargo" style="width:120px">
      <input id="tc-new-v" type="number" placeholder="0.00" step="0.01" style="width:70px">
      <span style="font-size:11px;color:var(--text2)">€</span>
      <button class="savebtn" onclick="addTCItem()">+ Añadir</button>
      <button class="ibtn" onclick="showingAddTC=false;renderGastos()">✕</button>
    </div>` : `<button class="abtn" onclick="showingAddTC=true;editingTCIdx=null;renderGastos()" style="margin-top:6px;font-size:11px">+ Añadir cargo TC</button>`;

  const tcHTML=`<div class="sep">Aqua Crédito — Tarjeta</div><div class="card">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
      <span style="font-size:11px;font-weight:500;color:var(--text2)">Cargos fijos</span>
      <span class="bdg bdg-acc" style="font-size:9px">BBVA</span>
      <span style="font-size:10px;color:var(--text3);margin-left:auto">Total fijo: €${fmtN(tcFija)}</span>
    </div>
    ${tcItems.length ? tcItems.map((g,gi)=>tcItemRow(g,gi)).join('') : '<div class="hint" style="font-size:11px">Sin cargos fijos</div>'}
    ${addTCForm}
    <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
    ${tcFinanciado
      ? `<div class="ri"><div class="ri-l"><div class="ri-name">Estado</div></div><div class="ri-r"><span class="bdg bdg-ok">Financiado</span><button class="ibtn" onclick="getD().tcFinanciado=false;renderGastos()" title="Deshacer">↺</button></div></div>`
      : `<div class="ri"><div class="ri-l"><div class="ri-name">Variable</div><div class="ri-meta">Compras extras del mes</div></div>
          <div class="ri-r" style="gap:4px"><input type="number" id="tc-var" value="${tcVar}" step="0.01" style="width:80px;text-align:right" oninput="updateTCTotal(${tcFija})" onblur="saveTCVar()"><span style="font-size:11px;color:var(--text2)">€</span></div>
        </div>`}
    <div class="trow"><span>Total Aqua Crédito</span><span id="tc-total-display">${tcFinanciado?'<span class="positive">Financiado</span>':tcPagado?`<span class="positive">€${fmtN(tcTotal)} ✓</span>`:`€${fmtN(tcTotal)}`}</span></div>
    ${!tcFinanciado&&!tcPagado?`<div style="display:flex;gap:6px;margin-top:8px">
      <button class="abtn" onclick="pagarFacturaTC()" style="flex:1;color:var(--green);border-color:var(--green);background:rgba(39,174,96,.08)">💳 Pagar factura</button>
      <button class="abtn" onclick="financiarTC()" style="flex:1;color:var(--blue);border-color:var(--blue);background:rgba(77,142,240,.08)">Financiar →</button>
    </div>`:''}
    ${tcPagado&&!tcFinanciado?`<button class="abtn" onclick="getD().tcPagado=false;updateTCRow(DATA,currentMonth);renderAll();scheduleSave()" style="margin-top:8px;font-size:10px">↺ Deshacer pago</button>`:''}
    ${tcFinanciado?`<button class="abtn" onclick="getD().tcFinanciado=false;updateTCRow(DATA,currentMonth);renderAll();scheduleSave()" style="margin-top:8px;font-size:10px">↺ Deshacer financiación</button>`:''}
    </div>
  </div>`;

  function creditoAplica(c){return creditoAplicaM(c,currentMonth,currentYear);}

  // BRL sorted desc
  const brlSorted=[...d.gastosREAL].sort((a,b)=>b.total-a.total);

  document.getElementById('page-gastos').innerHTML=`
    <div class="page-title">Gastos — ${MN[currentMonth]}</div>
    <div class="panel-grid">
      <div>${groupCard('BBVA',bbva,true,'BBVA')}${groupCard('Sabadell',sabadell,true,'Sabadell')}${brlSorted.length?`<div class="sep">BRL R$</div><div class="card">${brlSorted.map(g=>row(g,false)).join('')}<div class="trow"><span>Total</span><span>R$${fmtN(brlSorted.reduce((s,g)=>s+g.total,0))}</span></div></div>`:''}</div>
      <div>${groupCard('Otros EUR',otrosEUR,true,'Otros')}${tcHTML}
        <div class="card"><div class="card-title">+ Añadir gasto</div>
          <div class="fgrid">
            <div class="fc"><label>Descripción</label><input type="text" id="g-name" placeholder="Ej: Supermercado"></div>
            <div class="fc"><label>Importe</label><input type="number" id="g-total" step="0.01" placeholder="0.00"></div>
            <div class="fc"><label>Moneda</label><select id="g-moneda" onchange="updGCuenta()"><option value="EUR">EUR €</option><option value="BRL">BRL R$</option></select></div>
            <div class="fc"><label>Cuenta</label><select id="g-cuenta" onchange="handleOtros('g-cuenta',CUSTOM_CUENTAS_EUR)">${cuentaOptHTML(cEUR,null)}</select></div>
            <div class="fc"><label>Frecuencia</label><select id="g-tipo"><option value="fijo">Fijo (todos los meses)</option><option value="puntual">Puntual</option></select></div>
            <div class="fc"><label>Valor</label><select id="g-valor"><option value="fijo">Fijo (mismo importe)</option><option value="variable">Variable</option></select></div>
            <div class="fc"><label>Estado</label><select id="g-estado" onchange="togglePagadoInput()"><option value="pagado">Pagado</option><option value="pend">Pendiente</option><option value="parcial">Pago parcial</option></select></div>
            <div class="fc" id="g-pagado-wrap" style="display:none"><label>Importe pagado</label><input type="number" id="g-pagado" step="0.01" placeholder="0.00"></div>
            <div class="fc"><label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="g-tc"> Cargo en tarjeta crédito</label></div>
          </div>
          <button class="abtn" onclick="addGasto()">+ Añadir gasto</button>
        </div>
        ${renderCategoriasCard()}
      </div>
    </div>`;
}
function saveTCItems(){const d=getD();const items=d.gastosEUR.filter(g=>g.tc&&!g.isTCRow);items.forEach((g,gi)=>{const n=document.getElementById(`tce-n-${gi}`)?.value.trim();const v=parseFloat(document.getElementById(`tce-v-${gi}`)?.value)||0;if(n)g.name=n;g.total=v;g.pagado=v;});updateTCRow(DATA,currentMonth);showingTCEdit=false;renderAll();scheduleSave();}
function saveTCItemSingle(gi){const items=getD().gastosEUR.filter(g=>g.tc&&!g.isTCRow);const g=items[gi];if(!g)return;const n=document.getElementById(`tce-n-${gi}`)?.value.trim();const v=parseFloat(document.getElementById(`tce-v-${gi}`)?.value)||0;if(n)g.name=n;g.total=v;g.pagado=v;updateTCRow(DATA,currentMonth);editingTCIdx=null;renderAll();scheduleSave();}
function deleteTCItem(gi){const d=getD();const items=d.gastosEUR.filter(g=>g.tc&&!g.isTCRow);const item=items[gi];if(!item)return;const idx=d.gastosEUR.indexOf(item);if(idx!==-1)d.gastosEUR.splice(idx,1);updateTCRow(DATA,currentMonth);editingTCIdx=null;renderAll();scheduleSave();}
function addTCItem(){const n=document.getElementById('tc-new-n')?.value.trim();const v=parseFloat(document.getElementById('tc-new-v')?.value)||0;if(!n||!v)return;const item={name:n,total:v,pagado:v,cuenta:TC_NAME,tipo:'fijo',valor:'fijo',tc:true};getD().gastosEUR.push(item);updateTCRow(DATA,currentMonth);showingAddTC=false;editingTCIdx=null;renderAll();scheduleSave();}
function updateTCTotal(tcFija){const v=parseFloat(document.getElementById('tc-var')?.value)||0;const el=document.getElementById('tc-total-display');if(el)el.textContent=`€${fmtN(fmtM(tcFija+v))}`;}
function saveTCVar(){const val=parseFloat(document.getElementById('tc-var')?.value)||0;getD().tcVariable=fmtM(val);updateTCRow(DATA,currentMonth);renderAll();scheduleSave();}
function pagarFacturaTC(){const d=getD();d.tcPagado=true;updateTCRow(DATA,currentMonth);renderAll();scheduleSave();}
function financiarTC(){const d=getD();d.tcFinanciado=true;d.tcPagado=false;updateTCRow(DATA,currentMonth);renderAll();scheduleSave();const navEl=document.querySelector('.nav-item[onclick*="financ"]');if(navEl)showPage('financ',navEl);setTimeout(()=>{const f=document.getElementById('nf-name');if(f){f.scrollIntoView({behavior:'smooth',block:'center'});f.focus();}},80);}
function togglePagadoInput(){const el=document.getElementById('g-pagado-wrap');if(el)el.style.display=document.getElementById('g-estado')?.value==='parcial'?'block':'none';}
function updGCuenta(){const m=document.getElementById('g-moneda')?.value;const s=document.getElementById('g-cuenta');if(!s)return;s.innerHTML=cuentaOptHTML(m==='EUR'?BASE_CUENTAS_EUR():BASE_CUENTAS_BRL(),null);}
function saveGasto(idx,isEUR){
  const arr=isEUR?getD().gastosEUR:getD().gastosREAL;const g=arr[idx];
  const name=document.getElementById('eg-name')?.value.trim();const total=parseFloat(document.getElementById('eg-total')?.value)||0;
  const cuenta=document.getElementById('eg-cuenta')?.value||g.cuenta;const tipo=document.getElementById('eg-tipo')?.value||g.tipo;

function pagarCuota(id){const c=CREDITOS.find(x=>x.id===id);if(!c||c.cuotasPag>=c.totalCuotas)return;if(c.ultimoPagoMes===currentMonth&&c.ultimoPagoAnio===currentYear)return;c.cuotasPag++;c.pagado=fmtM(Math.min(c.cuotasPag*c.cuota,c.totalImporte));c.ultimoPagoMes=currentMonth;c.ultimoPagoAnio=currentYear;if(c.cuotasPag>=c.totalCuotas&&!c.liquidadoEn)c.liquidadoEn=`${String(currentMonth+1).padStart(2,'0')}/${currentYear}`;renderAll();scheduleSave();}
function quitarCuota(id){const c=CREDITOS.find(x=>x.id===id);if(!c||c.cuotasPag<=0)return;if(c.ultimoPagoMes!==currentMonth||c.ultimoPagoAnio!==currentYear)return;c.cuotasPag--;c.pagado=fmtM(Math.max(0,c.cuotasPag*c.cuota));c.ultimoPagoMes=null;c.ultimoPagoAnio=null;if(c.liquidadoEn){const[lm,ly]=c.liquidadoEn.split('/').map(Number);if(ly===currentYear&&(lm-1)===currentMonth)c.liquidadoEn=null;}renderAll();scheduleSave();}
function pagarFianza(id,cuentaNombre){const f=FIANZAS.find(x=>x.id===id);if(!f)return;f.pagada=true;confirmF=null;const cn=cuentaNombre||'Efectivo';for(let m=currentMonth;m<12;m++){const ct=(DATA[m]?.cuentas||[]).find(c=>c.name===cn);if(ct)ct.saldo=fmtM(ct.saldo-f.importe);}renderFinanc();renderCuentas();renderDashboard();scheduleSave();}
function addCredito(){const name=document.getElementById('nf-name')?.value.trim();const cuota=parseFloat(document.getElementById('nf-cuota')?.value)||0;const totalImporte=parseFloat(document.getElementById('nf-total')?.value)||0;const totalCuotas=parseInt(document.getElementById('nf-ncuotas')?.value)||1;const cuenta=document.getElementById('nf-cuenta')?.value||'BBVA';const tipo=document.getElementById('nf-tipo')?.value||'financiamiento';const inicio=document.getElementById('nf-inicio')?.value||'—';if(!name||!cuota)return;CREDITOS.push({id:++nextCreditId,name,cuota,totalImporte,pagado:0,cuotasPag:0,totalCuotas,inicio,cuenta,tipo});renderFinanc();scheduleSave();}
function saveCredito(id){const c=CREDITOS.find(x=>x.id===id);if(!c)return;c.name=document.getElementById('ec-name')?.value.trim()||c.name;c.cuota=parseFloat(document.getElementById('ec-cuota')?.value)||c.cuota;c.totalImporte=parseFloat(document.getElementById('ec-total')?.value)||c.totalImporte;c.totalCuotas=parseInt(document.getElementById('ec-ncuotas')?.value)||c.totalCuotas;c.cuenta=document.getElementById('ec-cuenta')?.value||c.cuenta;c.tipo=document.getElementById('ec-tipo')?.value||c.tipo;c.inicio=document.getElementById('ec-inicio')?.value||c.inicio;const liqV=parseFloat(document.getElementById('ec-liq')?.value);if(!isNaN(liqV))c.pagadoEnLiquidacion=fmtM(liqV);editingC=null;renderFinanc();renderDashboard();scheduleSave();}
function liquidarCredito(id){const c=CREDITOS.find(x=>x.id===id);if(!c)return;c.pagadoEnLiquidacion=fmtM((c.totalCuotas-c.cuotasPag)*c.cuota);c.cuotasPag=c.totalCuotas;c.pagado=c.totalImporte;c.liquidadoEn=`${String(currentMonth+1).padStart(2,'0')}/${currentYear}`;confirmLiquidar=null;renderAll();scheduleSave();}
function deleteCredito(id){CREDITOS=CREDITOS.filter(x=>x.id!==id);confirmC=editingC=null;renderAll();scheduleSave();}
function addFianza(){const nombre=document.getElementById('nfi-nombre')?.value.trim();const importe=parseFloat(document.getElementById('nfi-importe')?.value)||0;const moneda=document.getElementById('nfi-moneda')?.value||'€';const pagadoPor=document.getElementById('nfi-cuenta')?.value||'Efectivo';const notas=document.getElementById('nfi-notas')?.value.trim()||'';if(!nombre||!importe)return;const newId=Math.max(0,...FIANZAS.map(f=>f.id))+1;const inicio=String(currentMonth+1).padStart(2,'0')+'/'+currentYear;FIANZAS.push({id:newId,nombre,importe,moneda,pagadoPor,notas,pagada:false,inicio});renderFinanc();renderGastos();renderDashboard();scheduleSave();}
function exportCSV(soloMes){const meses=soloMes?[currentMonth]:Array.from({length:12},(_,i)=>i);const rows=[['Mes','Tipo','Nombre','Importe','Moneda','Cuenta','Estado']];meses.forEach(m=>{const d=DATA[m];if(!d)return;const mn=MN[m];d.gastosEUR.filter(g=>!g.tc).forEach(g=>rows.push([mn,'Gasto EUR',g.name,g.total,'€',g.cuenta,g.pagado>=g.total?'Pagado':g.pagado>0?'Parcial':'Pendiente']));d.gastosREAL.forEach(g=>rows.push([mn,'Gasto BRL',g.name,g.total,'R$',g.cuenta,g.pagado>=g.total?'Pagado':g.pagado>0?'Parcial':'Pendiente']));d.ingresos.forEach(i=>rows.push([mn,'Ingreso',i.name,i.total,i.moneda,i.cuenta,i.recibido>=i.total?'Recibido':i.recibido>0?'Parcial':'Pendiente']));});const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=soloMes?`finanzas_${MN[currentMonth]}_${currentYear}.csv`:`finanzas_${currentYear}_completo.csv`;a.click();URL.revokeObjectURL(a.href);}

async function importarHistorico(){
  const btn=document.getElementById('btn-import-hist');
  if(btn){btn.disabled=true;btn.textContent='Importando...';}
  // SAFETY: never touch month 5 (June) or later
  const SAFE_MONTHS=[0,1,2,3,4];
  SAFE_MONTHS.forEach(m=>{
    if(!DATA[m])DATA[m]={gastosEUR:[],gastosREAL:[],ingresos:[],cuentas:[],tcVariable:0,tcFinanciado:false};
    const h=HISTORICO_2026[m];
    DATA[m].gastosEUR=deepClone(h.gastosEUR);
    DATA[m].gastosREAL=deepClone(h.gastosREAL);
    DATA[m].ingresos=deepClone(h.ingresos);
    // cuentas, tcVariable, tcFinanciado are preserved
  });
  await saveToCloud(exportState());
  if(btn){btn.textContent='✓ Histórico importado';btn.style.background='var(--green-d)';btn.style.color='var(--green)';}
  renderAll();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function boot() {
  setSyncStatus('saving', 'Conectando...');
  const saved = await loadFromCloud();
  if (saved) {
    importState(saved);
    setSyncStatus('ok', 'Sincronizado ✓');
  } else {
    DATA = buildDefaultData();
    setSyncStatus('ok', 'Datos iniciales');
    // First time: save defaults to cloud
    await saveToCloud(exportState());
  }
  document.getElementById('loading').style.display = 'none';
  const shell = document.getElementById('appShell');
  shell.style.opacity = '1';
  renderAll();
}

const APP_PASSWORD = 'LExux6135'; // ← cambia esta contraseña

function checkAuth() {
  const pwd = document.getElementById('auth-pwd')?.value;
  if (pwd === APP_PASSWORD) {
    sessionStorage.setItem('cf_auth','1');
    document.getElementById('authOverlay').style.display = 'none';
    boot();
  } else {
    const err = document.getElementById('auth-err');
    err.style.display = 'block';
    document.getElementById('auth-pwd').value = '';
    document.getElementById('auth-pwd').focus();
  }
}

if (sessionStorage.getItem('cf_auth') === '1') {
  boot();
} else {
  document.getElementById('authOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('auth-pwd')?.focus(), 80);
}
